<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 天鹅配送系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container login-page">
        <div class="login-header">
            <div class="back-btn" onclick="goBack()">← 返回</div>
            <div class="login-title" id="loginTitle">司机登录</div>
        </div>

        <div class="login-form">
            <div class="driver-info" id="driverInfo" style="display: none;">
                <div class="driver-avatar-large" id="driverAvatar"></div>
                <div class="driver-name-large" id="driverName"></div>
            </div>

            <div class="input-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码" onkeypress="if(event.key==='Enter')doLogin()">
            </div>

            <button class="btn btn-primary btn-large" onclick="doLogin()">登录</button>

            <div class="login-hint" id="loginHint">初始密码为姓名拼音首字母小写</div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
