<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天鹅配送系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="top-actions">
                <div class="hotel-list-btn" onclick="showHotelModal()">
                    <span class="btn-icon">🏨</span>
                    <span class="btn-text">酒店列表</span>
                </div>
                <div class="admin-icon" onclick="goToAdmin()">⚙️</div>
            </div>
            <img class="logo" src="images/logo.jpg" alt="logo">
            <div class="title">天鹅配送系统</div>
            <div class="subtitle">请选择配送司机</div>
        </div>

        <!-- 司机列表 -->
        <div class="driver-list" id="driverList">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 酒店列表弹窗 -->
    <div class="modal" id="hotelModal" style="display: none;">
        <div class="modal-mask" onclick="hideHotelModal()"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <span class="modal-title">🏨 酒店列表</span>
                <span class="hotel-count" id="hotelCount">共 0 家</span>
            </div>

            <!-- 搜索框 -->
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="搜索酒店名称、联系人、电话" id="hotelSearchInput" oninput="filterHotels()">
                <span class="clear-btn" id="clearSearch" onclick="clearHotelSearch()" style="display: none;">✕</span>
            </div>

            <!-- 司机筛选 -->
            <div class="filter-row">
                <select class="filter-select" id="driverFilter" onchange="filterHotels()">
                    <option value="">全部司机</option>
                </select>
            </div>

            <!-- 酒店列表 -->
            <div class="hotel-list-scroll" id="hotelListContainer">
                <!-- 动态生成 -->
            </div>

            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="hideHotelModal()">关闭</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
