<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>司机主页 - 天鹅配送系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header driver-header">
            <div class="driver-info-row">
                <div class="driver-avatar" id="driverAvatar"></div>
                <div class="driver-info">
                    <div class="driver-name" id="driverName"></div>
                    <div class="driver-role">配送司机</div>
                </div>
            </div>
            <div class="header-actions">
                <span class="action-btn" onclick="changePassword()">修改密码</span>
                <span class="action-btn logout" onclick="logout()">退出</span>
            </div>
        </div>

        <!-- 快捷入口 -->
        <div class="quick-actions">
            <div class="action-item" onclick="goToDeliveryImages()">
                <div class="action-icon delivery">🖼️</div>
                <div class="action-info">
                    <div class="action-title">我的送货单</div>
                    <div class="action-desc">查看送货单图片</div>
                </div>
                <span class="action-arrow">></span>
            </div>

            <div class="action-item" onclick="goToHotelSearch()">
                <div class="action-icon search">🔍</div>
                <div class="action-info">
                    <div class="action-title">搜索酒店</div>
                    <div class="action-desc">查找酒店信息</div>
                </div>
                <span class="action-arrow">></span>
            </div>

            <div class="action-item" onclick="goToMyHotels()">
                <div class="action-icon hotel">🏨</div>
                <div class="action-info">
                    <div class="action-title">配送酒店</div>
                    <div class="action-desc">我负责的酒店列表</div>
                </div>
                <span class="action-arrow">></span>
            </div>

            <div class="action-item" onclick="goToMap()">
                <div class="action-icon map">🗺️</div>
                <div class="action-info">
                    <div class="action-title">我的线路</div>
                    <div class="action-desc">查看配送地图</div>
                </div>
                <span class="action-arrow">></span>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/driver-home.js"></script>
</body>
</html>
